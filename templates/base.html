<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Predictor{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <a href="/" class="brand">⚽ Predictor</a>
    {% if user %}
    <nav>
      <a href="/">Matches</a>
      <a href="/leaderboard">Leaderboard</a>
      <a href="/progress">Progress</a>
      <span class="me">{{ user["username"] }}</span>
      <a href="/logout">Logout</a>
    </nav>
    {% endif %}
  </header>
  <main class="{% block main_class %}{% endblock %}">
    {% block content %}{% endblock %}
  </main>
  <script>
    // Show each match time in the visitor's own timezone.
    document.querySelectorAll("time.localtime").forEach(function (el) {
      var d = new Date(el.getAttribute("datetime"));
      if (isNaN(d)) return;
      el.textContent = d.toLocaleString([], {
        weekday: "short", month: "short", day: "numeric",
        hour: "2-digit", minute: "2-digit"
      });
    });

    // Live lock countdown for open matches.
    function cdFormat(ms) {
      var s = Math.floor(ms / 1000);
      var d = Math.floor(s / 86400); s -= d * 86400;
      var h = Math.floor(s / 3600);  s -= h * 3600;
      var m = Math.floor(s / 60);    s -= m * 60;
      var pad = function (n) { return String(n).padStart(2, "0"); };
      if (d > 0) return d + "d " + h + "h";
      if (h > 0) return h + "h " + pad(m) + "m";
      if (m > 0) return m + "m " + pad(s) + "s";
      return pad(s) + "s";
    }
    function cdTick() {
      var now = Date.now();
      document.querySelectorAll(".countdown").forEach(function (el) {
        if (el.dataset.locked) return;
        var left = new Date(el.getAttribute("data-kickoff")).getTime() - now;
        if (left <= 0) {
          el.textContent = "🔒 Locked";
          el.classList.remove("urgent");
          el.classList.add("locked-cd");
          el.dataset.locked = "1";
          var card = el.closest(".match");
          if (card) {
            card.classList.add("locked");
            card.querySelectorAll("input.scorebox").forEach(function (i) { i.disabled = true; });
          }
        } else {
          el.textContent = "⏳ " + cdFormat(left);
          el.classList.toggle("urgent", left < 3600000); // < 1h
        }
      });
    }
    cdTick();
    setInterval(cdTick, 1000);

    // On load, jump to the next match to predict (first non-finished one).
    (function () {
      if (location.hash) return;                 // respect an explicit anchor
      var fm = document.getElementById("focus-match");
      if (fm) fm.scrollIntoView({ block: "start" });
    })();

    // Team results tooltip: one shared map, tooltip built lazily on first hover.
    var TEAM_RESULTS = {{ team_results | default({}) | tojson }};
    function fillTeamTip(side) {
      var tip = side.querySelector(".tip");
      if (!tip || tip.dataset.filled) return;
      tip.dataset.filled = "1";
      var title = document.createElement("span");
      title.className = "tip-title";
      title.textContent = side.getAttribute("data-team-name") + " — results";
      tip.appendChild(title);
      var rs = (TEAM_RESULTS && TEAM_RESULTS[side.getAttribute("data-team")]) || [];
      if (!rs.length) {
        var none = document.createElement("span");
        none.className = "muted"; none.textContent = "No results yet";
        tip.appendChild(none); return;
      }
      rs.forEach(function (r) {
        var line = document.createElement("span");
        line.className = "res-line res-" + r.res;
        line.textContent = r.res + " " + r.gf + "–" + r.ga + " ";
        var em = document.createElement("em");
        em.textContent = "vs " + r.opp;
        line.appendChild(em);
        tip.appendChild(line);
      });
    }
    document.querySelectorAll(".team-tip").forEach(function (side) {
      side.addEventListener("mouseenter", function () { fillTeamTip(side); });
    });

    // Per-match comments: toggle, lazy-load, post — no page reload.
    function cmtTime(iso) {
      var d = new Date(iso);
      return isNaN(d) ? "" : d.toLocaleString([], {
        month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
    }
    function cmtRow(c) {
      var row = document.createElement("div");
      row.className = "cmt";
      var who = document.createElement("span"); who.className = "cmt-who"; who.textContent = c.username;
      var when = document.createElement("span"); when.className = "cmt-when"; when.textContent = cmtTime(c.created_at);
      var body = document.createElement("div"); body.className = "cmt-body"; body.textContent = c.body;
      var head = document.createElement("div"); head.className = "cmt-head";
      head.appendChild(who); head.appendChild(when);
      row.appendChild(head); row.appendChild(body);
      return row;
    }
    document.querySelectorAll(".comments").forEach(function (box) {
      var mid = box.getAttribute("data-match");
      var toggle = box.querySelector(".cmt-toggle");
      var panel = box.querySelector(".cmt-panel");
      var list = box.querySelector(".cmt-list");
      var form = box.querySelector(".cmt-form");
      var input = box.querySelector(".cmt-input");
      var count = box.querySelector(".cmt-count");
      var loaded = false;

      toggle.addEventListener("click", function () {
        panel.hidden = !panel.hidden;
        if (!panel.hidden && !loaded) {
          loaded = true;
          fetch("/comments/" + mid).then(function (r) { return r.json(); }).then(function (cs) {
            list.innerHTML = "";
            cs.forEach(function (c) { list.appendChild(cmtRow(c)); });
            list.scrollTop = list.scrollHeight;
          });
        }
      });

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        var text = input.value.trim();
        if (!text) return;
        var fd = new FormData(); fd.append("body", text);
        fetch("/comment/" + mid, { method: "POST", body: fd })
          .then(function (r) { return r.ok ? r.json() : Promise.reject(); })
          .then(function (c) {
            list.appendChild(cmtRow(c));
            list.scrollTop = list.scrollHeight;
            input.value = "";
            count.textContent = String(parseInt(count.textContent || "0", 10) + 1);
          });
      });
    });
  </script>
</body>
</html>
